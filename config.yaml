project:
  name: "3eyedraven"
  
hardware:
  device: "cuda"
  gpu_vram_gb: 15
  fp16: true
  flash_attention: true
  num_workers: 4

model:
  encoder: "answerdotai/ModernBERT-large"
  max_length: 256
  hidden_size: 1024
  pooling: "mean"

intents:
  neutral_benign:
    - greeting
    - question
    - information_sharing
    - small_talk
  social_bonding:
    - solidarity_seeking
    - venting
    - humour
    - feedback
  passive_aggression:
    - baiting
    - sarcasm
    - passive_hostility
    - irony
  active_aggression:
    - direct_attack
    - threatening
    - escalating_aggression
  manipulation:
    - gaslighting
    - grooming
    - social_engineering
  evasion:
    - topic_deflection
    - denial
    - identity_concealment

training:
  epochs: 2
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-6
  warmup_ratio: 0.1
  weight_decay: 0.05
  alpha: 0.65
  beta: 0.5
  focal_loss_gamma: 1.0
  focal_loss_alpha: 0.75
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.15
  label_smoothing: 0.1
  scheduler: "cosine"
  save_steps: 5000
  early_stopping_patience: 3
  seed: 42

curriculum:
  stage_1:
    datasets: ["metahate", "jigsaw_2018", "jigsaw_2019", "civil_comments", "banking77", "clinc150", "daily_dialog"]
    description: "Explicit Foundation — learn toxicity boundaries + intent discrimination"
  stage_2:
    datasets: ["toxigen"]
    description: "Implicit & Adversarial — harden against sarcasm, microaggressions, escalation"

data:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true

pipeline:
  confidence_threshold: 0.65
  intent_confidence_threshold: 0.70
  block_threshold: 0.85
  flag_threshold: 0.65
  warn_threshold: 0.40
  session_window_size: 10
  session_ttl_seconds: 1800

hmm:
  n_iter: 100
  tol: 1.0e-4
  uncertain_state: true

escalation:
  provider: "groq"
  groq_model: "llama-3.3-70b-versatile"
  openai_model: "gpt-4o-mini"
  max_tokens: 512
  temperature: 0.1

targets:
  toxicity_f1: 0.85
  toxicity_auc_roc: 0.92
  toxicity_precision: 0.90
  intent_f1_macro: 0.80
  pipeline_latency_p95_ms: 100
  false_positive_rate: 0.05
  fairness_fpr_disparity: 0.05
  calibration_ece: 0.05
  inter_annotator_kappa: 0.80
