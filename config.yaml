# =============================================================================
# Project Configuration — Phase 2 (Updated 2026-05-06)
# =============================================================================

project:
  name: "real-time-content-moderation"
  version: "0.2.0"

# --- Hardware (RTX 4090 — 24GB VRAM) ---
hardware:
  device: "cuda"
  gpu_vram_gb: 24
  fp16: true
  flash_attention: true        # 4090 supports Flash Attention natively

# --- Model ---
model:
  encoder: "answerdotai/ModernBERT-large"
  max_length: 512              # Full context — 24GB VRAM allows it
  hidden_size: 1024            # ModernBERT-large hidden size

# --- Intent Taxonomy (6 Behavioural Clusters, 20 Labels) ---
intents:
  neutral_benign:
    - greeting
    - question
    - information_sharing
    - small_talk
  social_bonding:
    - solidarity_seeking
    - venting
    - humour
    - feedback
  passive_aggression:
    - baiting
    - sarcasm
    - passive_hostility
    - irony
  active_aggression:
    - direct_attack
    - threatening
    - escalating_aggression
  manipulation:
    - gaslighting
    - grooming
    - social_engineering
  evasion:
    - topic_deflection
    - denial
    - identity_concealment

# --- Training (Phase 2 Optimised — 4090 24GB) ---
training:
  epochs: 5
  batch_size: 32
  gradient_accumulation_steps: 1   # No accumulation needed on 24GB
  learning_rate: 5.0e-6            # Phase 2: slower to avoid memorization
  warmup_ratio: 0.1
  weight_decay: 0.05               # Phase 2: stronger regularization
  alpha: 0.5                       # toxicity loss weight
  beta: 0.5                        # intent loss weight
  focal_loss_gamma: 2.0
  focal_loss_alpha: 0.25
  lora_r: 8                        # Phase 2: reduced rank for generalization
  lora_alpha: 16                   # Keep ratio alpha/r = 2
  lora_dropout: 0.15               # Phase 2: stronger dropout
  seed: 42

# --- Curriculum stages ---
curriculum:
  stage_1:
    datasets: ["metahate", "jigsaw_2018", "jigsaw_2019", "civil_comments", "banking77", "clinc150", "daily_dialog"]
    description: "Explicit Foundation — learn toxicity boundaries + intent discrimination"
  stage_2:
    datasets: ["toxigen", "session_data"]
    description: "Implicit & Adversarial — harden against sarcasm, microaggressions, escalation"

# --- Data splits ---
data:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true

# --- Pipeline thresholds ---
pipeline:
  confidence_threshold: 0.65
  intent_confidence_threshold: 0.70   # min to feed HMM
  block_threshold: 0.85
  flag_threshold: 0.65
  warn_threshold: 0.40
  session_window_size: 10
  session_ttl_seconds: 1800

# --- HMM ---
hmm:
  n_iter: 100
  tol: 1.0e-4
  uncertain_state: true

# --- Escalation ---
escalation:
  provider: "groq"
  groq_model: "llama-3.3-70b-versatile"
  openai_model: "gpt-4o-mini"
  max_tokens: 512
  temperature: 0.1

# --- Evaluation targets ---
targets:
  toxicity_f1: 0.85
  toxicity_auc_roc: 0.92
  toxicity_precision: 0.90
  intent_f1_macro: 0.80
  pipeline_latency_p95_ms: 100
  false_positive_rate: 0.05
  fairness_fpr_disparity: 0.05
  calibration_ece: 0.05
  inter_annotator_kappa: 0.80
